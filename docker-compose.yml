services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pharmacy_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmacy_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy-network

  redis:
    image: redis:alpine
    networks:
      - pharmacy-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONNECTION_STRING: "Host=db;Database=pharmacy_db;Username=postgres;Password=password"
      REDIS_CONNECTION: "redis:6379,abortConnect=false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pharmacy-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.Web
    environment:
      - API_BASE_URL=http://api:8080/
    ports:
      - "5001:8080"
    depends_on:
      - api
    networks:
      - pharmacy-network

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - pharmacy-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - pharmacy-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - pharmacy-network

networks:
  pharmacy-network:
    driver: bridge

volumes:
  grafana_data: